    /*
     * Landscape A4 inner drawing area (EN ISO 5457):
     *   (297 - 10 - 20) x (210 - 10 - 10) = 267 x 190 mm
     * where margins are: right/top/bottom = 10 mm, left = 20 mm (binding edge).
     */
    #frame {
      width: 267mm;
      height: 190mm;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Diagram area grows to fill all space above the BOM and title block. */
    #diagram {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Description duplicates the DIN title block — hide it in the diagram area. */
    #description {
      display: none;
    }

    #diagram svg, #diagram img {
      max-width: 100%;
      max-height: 100%;
    }

    /*
     * BOM sits directly above the title block, right-aligned to match it.
     * align-self: flex-end aligns to the right edge in a column flex container.
     */
    #bom {
      flex-shrink: 0;
      align-self: flex-end;
    }

    #bom table {
      width: 180mm;
    }

    #titleblock tr, #bom tr {
      height: 4.25mm;
    }

    /* Title block sits at the bottom-right, same width as the DIN 6771 block. */
    #titleblock {
      flex-shrink: 0;
      align-self: flex-end;
    }

    #titleblock table {
      width: 180mm;
      height: 38.25mm;
    }

    #bom th, td {
